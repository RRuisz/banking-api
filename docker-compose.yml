

services:

  db: 
    image: postgres:16
    container_name: banking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: banking_api
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    
volumes:
  db_data: